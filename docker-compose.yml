services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - DATABASE_URL=postgres://aba:aba_password@db:5432/aba_pocket?sslmode=disable
      - SESSION_SECRET=${SESSION_SECRET:-please-change-this-32char-secret!!}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DEV_MODE=${DEV_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aba-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       aba_pocket
      POSTGRES_USER:     aba
      POSTGRES_PASSWORD: aba_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aba -d aba_pocket"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - aba-net

volumes:
  postgres_data:

networks:
  aba-net:
    driver: bridge
