services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - DATABASE_URL=postgres://aba:aba_password@db:5432/aba_pocket?sslmode=disable
      - SESSION_SECRET=${SESSION_SECRET:-please-change-this-32char-secret!!}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DEV_MODE=${DEV_MODE:-false}
      - IMPRINT_NAME=${IMPRINT_NAME:-}
      - IMPRINT_STREET=${IMPRINT_STREET:-}
      - IMPRINT_ZIP=${IMPRINT_ZIP:-}
      - IMPRINT_CITY=${IMPRINT_CITY:-}
      - IMPRINT_EMAIL=${IMPRINT_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: aba_pocket
      POSTGRES_USER: aba
      POSTGRES_PASSWORD: aba_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aba -d aba_pocket" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
