{{define "page_title"}}Medikamente{{end}}
{{define "page_content"}}
<div class="page-header">
  <h1 class="medication-title">Medikamente</h1>
  <a href="/pdf/all" class="btn btn-outline btn-sm" target="_blank">📄 Alle als PDF</a>
</div>

{{if .Data}}
<ul class="card-list card-list-full">
  {{range .Data}}
  <li>
    <a href="/medications/{{.ID}}" class="card-list-item medication-item">
      <span class="card-title">{{.Name}}</span>
      <span class="card-meta">
        {{if .Source}}<span class="card-source">{{.Source}}</span>{{end}}
        <span class="card-updated">Stand: {{formatDate .UpdatedAt}}</span>
      </span>
    </a>
  </li>
  {{end}}
</ul>
{{else}}
<p class="empty-state">Noch keine Medikamente vorhanden.</p>
{{end}}
{{end}}
