sonar.projectKey=pwannenmacher_ABA-Pocket
sonar.organization=pwannenmacher

sonar.projectName=ABA Pocket
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,**/migrations/**,**/web/static/**,**/web/templates/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

# Infrastructure-Code aus der Coverage-Berechnung ausschließen:
# main.go und db/ sind nicht unit-testbar (erfordern laufende DB / Prozess-Start).
sonar.coverage.exclusions=main.go,internal/db/**

sonar.sourceEncoding=UTF-8
